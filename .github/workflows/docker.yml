name: Docker Compose Build & Push

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - '.env.example'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          POSTGRES_USER=ci_user
          POSTGRES_PASSWORD=ci_password
          POSTGRES_DB=n8n_ci
          N8N_ENCRYPTION_KEY=ci-secret-key-for-testing-only
          N8N_USER_MANAGEMENT_JWT_SECRET=ci-jwt-secret-for-testing-only
          N8N_DEFAULT_BINARY_DATA_MODE=filesystem
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config > /dev/null
        env:
          COMPOSE_FILE: docker-compose.yml

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - n8n
          - ollama
          - open-webui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE=${{ matrix.service }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}

  test:
    name: Test Docker Compose Services
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          POSTGRES_USER=ci_user
          POSTGRES_PASSWORD=ci_password
          POSTGRES_DB=n8n_ci
          N8N_ENCRYPTION_KEY=ci-secret-key-for-testing-only
          N8N_USER_MANAGEMENT_JWT_SECRET=ci-jwt-secret-for-testing-only
          N8N_DEFAULT_BINARY_DATA_MODE=filesystem
          EOF

      - name: Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Health check
        run: |
          docker compose ps

      - name: Cleanup
        if: always()
        run: docker compose down -v

  notify:
    name: Build Complete
    runs-on: ubuntu-latest
    needs: [validate, build, test]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.validate.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.test.result }}" = "failure" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "Build succeeded"
