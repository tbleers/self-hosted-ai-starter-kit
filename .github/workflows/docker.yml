name: Docker Compose Validation & Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          POSTGRES_USER=ci_user
          POSTGRES_PASSWORD=ci_password
          POSTGRES_DB=n8n_ci
          N8N_ENCRYPTION_KEY=ci-secret-key-for-testing-only
          N8N_USER_MANAGEMENT_JWT_SECRET=ci-jwt-secret-for-testing-only
          N8N_DEFAULT_BINARY_DATA_MODE=filesystem
          EOF

      - name: Validate docker-compose.yml syntax
        run: docker compose config > /dev/null

      - name: Check image availability
        run: |
          echo "Checking Docker images referenced in compose file..."
          docker compose pull --dry-run || true

  test:
    name: Test Docker Compose Services
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          POSTGRES_USER=ci_user
          POSTGRES_PASSWORD=ci_password
          POSTGRES_DB=n8n_ci
          N8N_ENCRYPTION_KEY=ci-secret-key-for-testing-only
          N8N_USER_MANAGEMENT_JWT_SECRET=ci-jwt-secret-for-testing-only
          N8N_DEFAULT_BINARY_DATA_MODE=filesystem
          EOF

      - name: Pull Docker images
        run: docker compose pull

      - name: Start core services
        run: |
          docker compose up -d postgres qdrant
          sleep 10

      - name: Health check - PostgreSQL
        run: |
          docker compose exec -T postgres pg_isready -h localhost -U ci_user -d n8n_ci

      - name: Health check - Qdrant
        run: |
          docker compose ps qdrant | grep "Up"

      - name: View logs
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate, test, scan]
    if: always()
    steps:
      - name: Check overall status
        run: |
          VALIDATE="${{ needs.validate.result }}"
          TEST="${{ needs.test.result }}"
          SCAN="${{ needs.scan.result }}"
          
          echo "✅ Docker Compose validation: $VALIDATE"
          echo "✅ Service tests: $TEST"
          echo "✅ Security scan: $SCAN"
          
          if [ "$VALIDATE" != "success" ] || [ "$TEST" != "success" ] || [ "$SCAN" != "success" ]; then
            exit 1
          fi
